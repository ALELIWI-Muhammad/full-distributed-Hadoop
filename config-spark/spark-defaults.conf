# ── Spark defaults – YARN mode on Hadoop cluster ──────────────────────────────

# Submit to YARN by default
spark.master                     yarn

# Deploy mode: client (driver runs in the spark container)
spark.submit.deployMode          client

# Point Spark to the Hadoop config so it can reach HDFS & YARN
spark.hadoop.fs.defaultFS        hdfs://namenode:9000

# Executor resources
spark.executor.memory            512m
spark.executor.cores             1
spark.executor.instances         2

# Driver memory
spark.driver.memory              512m

# Event log (optional – writes to HDFS)
# spark.eventLog.enabled           true
# spark.eventLog.dir               hdfs://namenode:9000/spark-logs

# History server (optional)
# spark.history.fs.logDirectory    hdfs://namenode:9000/spark-logs
