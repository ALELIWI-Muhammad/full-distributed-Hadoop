services:

  # ─────────────────────────────────────────────
  # Hadoop cluster
  # ─────────────────────────────────────────────
  namenode:
    build: .
    container_name: namenode
    hostname: namenode
    ports:
      - "9870:9870"   # HDFS Web UI
      - "8088:8088"   # YARN Resource Manager UI
      - "9000:9000"   # HDFS RPC
    networks:
      - hadoop

  datanode1:
    build: .
    container_name: datanode1
    hostname: datanode1
    depends_on:
      - namenode
    networks:
      - hadoop

  datanode2:
    build: .
    container_name: datanode2
    hostname: datanode2
    depends_on:
      - namenode
    networks:
      - hadoop

  # ─────────────────────────────────────────────
  # PostgreSQL – Hive Metastore backend
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    hostname: postgres
    environment:
      POSTGRES_DB: metastore_db
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hadoop
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Hive Metastore (standalone)
  # ─────────────────────────────────────────────
  metastore:
    build:
      context: .
      dockerfile: Dockerfile.hive
    image: hive-with-postgres:4.0.0
    container_name: metastore
    hostname: metastore
    depends_on:
      postgres:
        condition: service_healthy
      namenode:
        condition: service_started
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: "-Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/metastore_db -Djavax.jdo.option.ConnectionUserName=hive -Djavax.jdo.option.ConnectionPassword=hive"
      HIVE_CUSTOM_CONF_DIR: /hive_custom_conf
    ports:
      - "9083:9083"
    volumes:
      - ./config-hive:/hive_custom_conf:ro
      - warehouse:/opt/hive/data/warehouse
    networks:
      - hadoop
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9083'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ─────────────────────────────────────────────
  # HiveServer2
  # ─────────────────────────────────────────────
  hiveserver2:
    build:
      context: .
      dockerfile: Dockerfile.hive
    image: hive-with-postgres:4.0.0
    container_name: hiveserver2
    hostname: hiveserver2
    depends_on:
      metastore:
        condition: service_healthy
    environment:
      SERVICE_NAME: hiveserver2
      IS_RESUME: "true"
      SERVICE_OPTS: "-Dhive.metastore.uris=thrift://metastore:9083 -Dhive.server2.thrift.port=10000 -Dhive.server2.webui.port=10002"
      HIVE_CUSTOM_CONF_DIR: /hive_custom_conf
    ports:
      - "10000:10000"
      - "10002:10002"
    volumes:
      - ./config-hive:/hive_custom_conf:ro
      - warehouse:/opt/hive/data/warehouse
    networks:
      - hadoop

# ─────────────────────────────────────────────
# Named volumes
# ─────────────────────────────────────────────
volumes:
  postgres_data:
  warehouse:

networks:
  hadoop:
